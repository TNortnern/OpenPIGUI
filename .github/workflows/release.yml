name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Require mac code signing for auto-update release
        run: |
          if [ -z "${{ secrets.CSC_LINK }}" ]; then
            echo "::error::CSC_LINK is required to publish signed mac auto-update artifacts."
            exit 1
          fi

      - name: Verify install copy
        run: pnpm verify:install-copy

      - name: Build website
        run: pnpm --filter @pi-gui/website run build

      - name: Build
        run: pnpm --filter @pi-gui/desktop run build

      - name: Package
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # Prefer identity from keychain when CSC_LINK is absent (self-hosted / local runners).
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK && 'true' || 'true' }}
        run: |
          cd apps/desktop
          # Enable notarization only when App Store Connect API secrets are present.
          if [ -n "${APPLE_API_KEY:-}" ] && [ -n "${APPLE_API_KEY_ID:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ]; then
            APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
            printf '%s' "$APPLE_API_KEY" > "$APPLE_API_KEY_PATH"
            export APPLE_API_KEY="$APPLE_API_KEY_PATH"
            NOTARIZE_FLAG="-c.mac.notarize=true"
          else
            echo "::warning::Apple notarization secrets missing; packaging signed/unsigned without notarize."
            NOTARIZE_FLAG="-c.mac.notarize=false"
          fi
          pnpm exec electron-builder --mac \
            --publish never \
            $NOTARIZE_FLAG \
            "-c.extraMetadata.version=${GITHUB_REF_NAME#v}"

      - name: Verify packaged runtime dependencies
        run: pnpm --dir apps/desktop run verify:packaged-runtime-deps

      - name: Verify release update metadata
        run: node apps/desktop/scripts/assert-packaged-runtime-deps.mjs --verify-release-update-artifacts --platform darwin

      - name: Verify Homebrew tap rewrite
        run: pnpm test:homebrew-tap

      - name: Smoke test the packaged release zip
        run: pnpm --dir apps/desktop run test:prod:release-zip-smoke:ci

      - name: Staple macOS artifacts
        run: |
          if xcrun stapler staple apps/desktop/release/*.dmg 2>/dev/null; then
            xcrun stapler validate apps/desktop/release/*.dmg
          else
            echo "::warning::DMG stapling skipped (not notarized or stapler unavailable)."
          fi

      - name: Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.zip.blockmap
            apps/desktop/release/latest-mac.yml
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true

      - name: Sync Homebrew tap
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' && secrets.HOMEBREW_TAP_REPO != '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPO: ${{ secrets.HOMEBREW_TAP_REPO }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" homebrew-tap
          pnpm release:homebrew-sync \
            --tap-dir "$PWD/homebrew-tap" \
            --version "${GITHUB_REF_NAME#v}" \
            --tag "${GITHUB_REF_NAME}" \
            --github-repo "${GITHUB_REPOSITORY}" \
            --cask-token openpigui \
            --asset-name "OpenPIGUI-${GITHUB_REF_NAME#v}-arm64.dmg" \
            --dmg-path "$PWD/apps/desktop/release/OpenPIGUI-${GITHUB_REF_NAME#v}-arm64.dmg" \
            --commit \
            --push

  release-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Package Linux AppImage
        run: |
          cd apps/desktop
          pnpm run build
          pnpm exec electron-builder --linux AppImage \
            --publish never \
            "-c.extraMetadata.version=${GITHUB_REF_NAME#v}"

      - name: Verify packaged runtime dependencies
        run: pnpm --dir apps/desktop run verify:packaged-runtime-deps:linux

      - name: Verify release update metadata
        run: node apps/desktop/scripts/assert-packaged-runtime-deps.mjs --verify-release-update-artifacts --platform linux

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.AppImage.zsync
            apps/desktop/release/latest-linux*.yml
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true

  release-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Package Windows
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          cd apps/desktop
          pnpm run build
          node scripts/package-windows.mjs --win --publish never --config.npmRebuild=false "-c.extraMetadata.version=${GITHUB_REF_NAME#v}"

      - name: Verify packaged runtime dependencies
        run: pnpm --dir apps/desktop run verify:packaged-runtime-deps:windows

      - name: Verify release update metadata
        run: node apps/desktop/scripts/assert-packaged-runtime-deps.mjs --verify-release-update-artifacts --platform win32

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.exe.blockmap
            apps/desktop/release/latest.yml
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
